<div class="ng-datepicker">
  @if (label()) {
    <ng-label [text]="label()!" [forId]="id()" [hint]="hint()" [required]="required()"></ng-label>
  }

  <mat-form-field class="ng-datepicker__field" [appearance]="appearance()" [subscriptSizing]="'dynamic'">
    <input
      matInput
      [matDatepicker]="picker"
      [id]="id()"
      [placeholder]="placeholder()"
      [required]="required()"
      [disabled]="resolvedDisabled()"
      [min]="min()"
      [max]="max()"
      [ngModel]="value()"
      (ngModelChange)="updateValue($event)"
      (blur)="markAsTouched()"
    />
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker
      #picker
      [touchUi]="touchUi()"
      [startView]="startView()"
    ></mat-datepicker>

    @if (showError()) {
      <ng-error [id]="id() + '-error'" [error]="errorText()"></ng-error>
    } @else if (helperText()) {
      <mat-hint [id]="id() + '-helper'">{{ helperText() }}</mat-hint>
    }
  </mat-form-field>
</div>
