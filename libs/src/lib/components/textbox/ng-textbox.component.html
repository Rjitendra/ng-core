<div class="ng-textbox">
  @if (label()) {
    <ng-label
      [text]="label()!"
      [forId]="id()"
      [hint]="hint()"
      [required]="required()"
    ></ng-label>
  }

  <mat-form-field
    class="ng-textbox__field"
    [appearance]="appearance()"
    [subscriptSizing]="'dynamic'"
  >
    @if (prefixIcon()) {
      <ng-icon matPrefix [name]="prefixIcon()!" size="sm" tone="muted"></ng-icon>
    }

    @if (multiline()) {
      <textarea
        matInput
        [id]="id()"
        [value]="value()"
        [rows]="rows()"
        [placeholder]="placeholder()"
        [required]="required()"
        [disabled]="resolvedDisabled()"
        [readonly]="readonly()"
        [attr.maxlength]="maxLength() ?? null"
        [attr.autocomplete]="autocomplete() ?? null"
        [attr.aria-describedby]="describedBy()"
        (input)="updateValue(($any($event.target).value ?? '').toString())"
        (blur)="markAsTouched()"
      ></textarea>
    } @else {
      <input
        matInput
        [id]="id()"
        [type]="type()"
        [value]="value()"
        [placeholder]="placeholder()"
        [required]="required()"
        [disabled]="resolvedDisabled()"
        [readonly]="readonly()"
        [attr.maxlength]="maxLength() ?? null"
        [attr.autocomplete]="autocomplete() ?? null"
        [attr.aria-describedby]="describedBy()"
        (input)="updateValue(($any($event.target).value ?? '').toString())"
        (blur)="markAsTouched()"
      />
    }

    @if (suffixIcon()) {
      <ng-icon matSuffix [name]="suffixIcon()!" size="sm" tone="muted"></ng-icon>
    }

    @if (showError()) {
      <ng-error [id]="id() + '-error'" [error]="errorText()"></ng-error>
    } @else if (helperText()) {
      <mat-hint [id]="id() + '-helper'">{{ helperText() }}</mat-hint>
    }
  </mat-form-field>
</div>
